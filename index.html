<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stream Rooms - Landing Page</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        /* Login Modal Styles */
        .login-modal {
            display: flex;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        .login-modal.hidden {
            display: none;
        }

        .login-container {
            background: white;
            padding: 50px 40px;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 400px;
            width: 100%;
            text-align: center;
        }

        .login-container h2 {
            color: #333;
            font-size: 2em;
            margin-bottom: 30px;
            font-weight: 700;
        }

        .form-group {
            margin-bottom: 20px;
            text-align: left;
        }

        .form-group label {
            display: block;
            color: #555;
            font-weight: 600;
            margin-bottom: 8px;
            font-size: 0.95em;
        }

        .form-group input {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 1em;
            transition: border-color 0.3s ease;
        }

        .form-group input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .login-btn {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1.1em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 10px;
        }

        .login-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(102, 126, 234, 0.4);
        }

        .login-btn:active {
            transform: translateY(0);
        }

        .error-message {
            color: #f5576c;
            font-size: 0.9em;
            margin-top: 15px;
            display: none;
            font-weight: 600;
        }

        .success-message {
            color: #43e97b;
            font-size: 0.9em;
            margin-top: 15px;
            display: none;
            font-weight: 600;
        }

        /* Main Content Styles */
        .container {
            text-align: center;
            background: rgba(255, 255, 255, 0.95);
            padding: 60px 40px;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 900px;
            width: 100%;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 40px;
            padding-bottom: 20px;
            border-bottom: 2px solid #eee;
        }

        h1 {
            color: #333;
            font-size: 2.5em;
            margin: 0;
            font-weight: 700;
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .user-name {
            color: #666;
            font-size: 1em;
            font-weight: 600;
        }

        .logout-btn {
            padding: 8px 16px;
            background: #f5576c;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.9em;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .logout-btn:hover {
            background: #d93a54;
            transform: translateY(-2px);
        }

        .subtitle {
            color: #666;
            font-size: 1.1em;
            margin-bottom: 50px;
        }

        .buttons-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 25px;
            margin-bottom: 40px;
        }

        .btn-card {
            position: relative;
            overflow: hidden;
            border-radius: 12px;
            text-decoration: none;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
            display: flex;
            flex-direction: column;
            height: 300px;
        }

        .btn-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.3);
        }

        .btn-card:active {
            transform: translateY(-2px);
        }

        .btn-card-image {
            width: 100%;
            height: 70%;
            object-fit: cover;
            transition: transform 0.3s ease;
        }

        .btn-card:hover .btn-card-image {
            transform: scale(1.05);
        }

        .btn-card-text {
            height: 30%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.1em;
            font-weight: 600;
            color: white;
            padding: 10px;
            text-align: center;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }

        .btn-secondary {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
        }

        .btn-tertiary {
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
        }

        /* Main Room Button Styles */
        .main-room-container {
            margin-top: 30px;
            display: flex;
            justify-content: center;
        }

        .btn-main-room {
            padding: 40px 60px;
            font-size: 1.5em;
            background: linear-gradient(135deg, #ff6b6b 0%, #ff8787 100%);
            color: white;
            width: 300px;
            height: 150px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 16px;
            text-decoration: none;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
            font-weight: 600;
        }

        .btn-main-room:hover {
            background: linear-gradient(135deg, #ff5252 0%, #ff6e6e 100%);
            transform: scale(1.08) translateY(-5px);
            box-shadow: 0 15px 40px rgba(255, 107, 107, 0.4);
        }

        .btn-main-room:active {
            transform: scale(1.05) translateY(-2px);
        }

        .session-warning {
            background-color: #fff3cd;
            border: 1px solid #ffc107;
            color: #856404;
            padding: 12px;
            border-radius: 6px;
            margin-top: 20px;
            font-size: 0.9em;
            display: none;
        }

        .session-warning.show {
            display: block;
        }

        @media (max-width: 1024px) {
            .buttons-grid {
                grid-template-columns: repeat(2, 1fr);
            }

            .btn-main-room {
                padding: 30px 50px;
                font-size: 1.3em;
                width: 250px;
                height: 120px;
            }
        }

        @media (max-width: 768px) {
            h1 {
                font-size: 1.8em;
            }

            .container {
                padding: 40px 25px;
            }

            .header {
                flex-direction: column;
                gap: 15px;
                text-align: center;
                margin-bottom: 30px;
            }

            .buttons-grid {
                grid-template-columns: 1fr;
                gap: 15px;
            }

            .btn-card {
                height: 250px;
            }

            .btn-main-room {
                padding: 25px 40px;
                font-size: 1.2em;
                width: 100%;
                height: 100px;
            }
        }
    </style>
</head>
<body>
    <!-- Login Modal -->
    <div class="login-modal" id="loginModal">
        <div class="login-container">
            <h2>🔐 Login</h2>
            <form id="loginForm">
                <div class="form-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" name="username" placeholder="Enter your username" required>
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" placeholder="Enter your password" required>
                </div>
                <button type="submit" class="login-btn">Login</button>
                <div class="error-message" id="errorMessage">❌ Invalid username or password</div>
                <div class="success-message" id="successMessage">✅ Login successful!</div>
            </form>
        </div>
    </div>

    <!-- Main Content -->
    <div class="container" id="mainContent" style="display: none;">
        <div class="header">
            <h1>🎬 Stream Rooms</h1>
            <div class="user-info">
                <span class="user-name">👤 <span id="displayUsername"></span></span>
                <button class="logout-btn" onclick="logout()">Logout</button>
            </div>
        </div>
        
        <p class="subtitle">Select a room to join</p>
        
        <div class="buttons-grid">
            <a href="video-stream.html" class="btn-card btn-primary">
                <img src="https://via.placeholder.com/400x280/667eea/ffffff?text=Room+Stream+1" alt="Room Stream 1" class="btn-card-image">
                <div class="btn-card-text">🎥 Room Stream 1</div>
            </a>
            <a href="video-stream2.html" class="btn-card btn-secondary">
                <img src="https://via.placeholder.com/400x280/f093fb/ffffff?text=Room+Stream+2" alt="Room Stream 2" class="btn-card-image">
                <div class="btn-card-text">🎥 Room Stream 2</div>
            </a>
            <a href="video-stream3.html" class="btn-card btn-tertiary">
                <img src="https://via.placeholder.com/400x280/4facfe/ffffff?text=Room+Stream+3" alt="Room Stream 3" class="btn-card-image">
                <div class="btn-card-text">🎥 Room Stream 3</div>
            </a>
        </div>

        <div class="main-room-container">
            <a href="video-stream.html" class="btn-main-room">
                ⭐ MAIN ROOM STREAM
            </a>
        </div>

        <div class="session-warning" id="sessionWarning">
            ⏰ Your session will expire if you close this tab or navigate away without properly logging out.
        </div>
    </div>

    <script>
        // HARDCODED USERS DATABASE (Embedded in HTML)
        const validUsers = [
            {
                "id": 1,
                "username": "admin",
                "password": "admin123",
                "email": "admin@example.com"
            },
            {
                "id": 2,
                "username": "KcoN26",
                "password": "LEtSKc0N!",
                "email": "default@gmail.com"
            },
            {
                "id": 3,
                "username": "user2",
                "password": "pass456",
                "email": "user2@example.com"
            },
            {
                "id": 4,
                "username": "test",
                "password": "test123",
                "email": "test@example.com"
            }
        ];

        console.log('✅ Valid users database loaded:', validUsers.length, 'users');

        // ===== SESSION MANAGEMENT =====
        
        // Auto-logout when tab/window is closed
        window.addEventListener('beforeunload', function() {
            // This triggers when user closes tab, navigates away, or refreshes
            const currentUser = localStorage.getItem('currentUser');
            if (currentUser) {
                console.log('🚪 User session terminated: Tab closed or page left');
                localStorage.removeItem('currentUser');
            }
        });

        // Auto-logout when browser/tab is closed (not just page navigation)
        window.addEventListener('unload', function() {
            const currentUser = localStorage.getItem('currentUser');
            if (currentUser) {
                console.log('🚪 User session terminated: Browser/Tab closed');
                localStorage.removeItem('currentUser');
            }
        });

        // Detect if user navigated to a different domain
        window.addEventListener('pagehide', function(event) {
            if (event.persisted === false) {
                // Page is being unloaded
                const currentUser = localStorage.getItem('currentUser');
                if (currentUser) {
                    console.log('🚪 User session terminated: Left the application');
                    // Clear only when truly leaving the site
                    if (!window.location.href.includes('localhost') && !window.location.href.includes('127.0.0.1')) {
                        localStorage.removeItem('currentUser');
                    }
                }
            }
        });

        // Check if user is logged in when page loads
        window.addEventListener('DOMContentLoaded', function() {
            const currentUser = localStorage.getItem('currentUser');
            console.log('📌 Current user from storage:', currentUser);
            
            if (currentUser) {
                showMainContent(currentUser);
                showSessionWarning();
            } else {
                showLoginForm();
            }
        });

        // Handle login form submission
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            
            console.log('🔐 Login attempt:', username);
            
            // Hide previous messages
            document.getElementById('errorMessage').style.display = 'none';
            document.getElementById('successMessage').style.display = 'none';

            if (!username || !password) {
                console.log('❌ Empty credentials');
                showError('Please enter both username and password');
                return;
            }

            // STRICT validation against embedded database
            const user = validUsers.find(u => u.username === username && u.password === password);

            if (user) {
                // Valid credentials
                console.log('✅ Login successful! User:', user.username, 'ID:', user.id);
                document.getElementById('successMessage').style.display = 'block';
                
                // Store user session in localStorage
                localStorage.setItem('currentUser', username);
                console.log('💾 User session saved to localStorage');
                
                // Clear form
                document.getElementById('loginForm').reset();
                
                // Show main content after short delay
                setTimeout(() => {
                    showMainContent(username);
                    showSessionWarning();
                }, 500);
            } else {
                // Invalid credentials
                console.log('❌ Login REJECTED - no matching user');
                console.log('Available users:', validUsers.map(u => u.username).join(', '));
                showError('Invalid username or password');
            }
        });

        function showError(message) {
            const errorElement = document.getElementById('errorMessage');
            errorElement.textContent = '❌ ' + message;
            errorElement.style.display = 'block';
        }

        function showLoginForm() {
            document.getElementById('loginModal').classList.remove('hidden');
            document.getElementById('mainContent').style.display = 'none';
            console.log('📋 Login form displayed');
        }

        function showMainContent(username) {
            document.getElementById('loginModal').classList.add('hidden');
            document.getElementById('mainContent').style.display = 'block';
            document.getElementById('displayUsername').textContent = username;
            console.log('✅ Main content displayed for user:', username);
        }

        function showSessionWarning() {
            document.getElementById('sessionWarning').classList.add('show');
        }

        function logout() {
            console.log('🚪 Logging out user');
            localStorage.removeItem('currentUser');
            document.getElementById('loginForm').reset();
            document.getElementById('errorMessage').style.display = 'none';
            document.getElementById('successMessage').style.display = 'none';
            document.getElementById('sessionWarning').classList.remove('show');
            showLoginForm();
        }

        // Prevent back button access after logout
        window.addEventListener('pageshow', function(event) {
            if (event.persisted) {
                const currentUser = localStorage.getItem('currentUser');
                if (!currentUser) {
                    showLoginForm();
                    console.log('🔄 Page restored: No active session, showing login');
                } else {
                    showMainContent(currentUser);
                    showSessionWarning();
                    console.log('🔄 Page restored: User session active');
                }
            }
        });

        // Additional: Clear session if user tries to go back to login page directly
        window.addEventListener('popstate', function(event) {
            console.log('🔙 Back button pressed');
            const currentUser = localStorage.getItem('currentUser');
            if (!currentUser) {
                showLoginForm();
            }
        });
    </script>
</body>
</html>
