<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Download Repository</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 20px;
            padding: 50px 40px;
            max-width: 600px;
            width: 100%;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }

        h1 {
            color: white;
            font-size: 2em;
            font-weight: 700;
            margin-bottom: 10px;
            text-shadow: 0 2px 4px rgba(0,0,0,0.2);
        }

        .subtitle {
            color: rgba(255, 255, 255, 0.8);
            font-size: 1em;
            margin-bottom: 40px;
        }

        .download-list {
            display: flex;
            flex-direction: column;
            gap: 20px;
            margin-bottom: 40px;
        }

        .download-btn {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(255, 255, 255, 0.15);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 14px;
            padding: 20px 25px;
            color: white;
            text-decoration: none;
            font-size: 1.1em;
            font-weight: 600;
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .download-btn:hover {
            background: rgba(255, 255, 255, 0.25);
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.2);
        }

        .download-btn:active {
            transform: translateY(-1px);
        }

        .download-btn .btn-label {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .download-btn .btn-icon {
            font-size: 1.4em;
        }

        .download-btn .download-icon {
            font-size: 1.2em;
            opacity: 0.8;
        }

        .btn-artist {
            background: linear-gradient(135deg, rgba(102, 126, 234, 0.4), rgba(118, 75, 162, 0.4));
            border-color: rgba(102, 126, 234, 0.5);
        }

        .btn-x {
            background: linear-gradient(135deg, rgba(240, 147, 251, 0.4), rgba(245, 87, 108, 0.4));
            border-color: rgba(240, 147, 251, 0.5);
        }

        .btn-mcountdown {
            background: linear-gradient(135deg, rgba(79, 172, 254, 0.4), rgba(0, 242, 254, 0.4));
            border-color: rgba(79, 172, 254, 0.5);
        }

        .nav-back {
            display: inline-block;
            color: rgba(255, 255, 255, 0.8);
            text-decoration: none;
            font-size: 0.95em;
            transition: color 0.3s;
        }

        .nav-back:hover {
            color: white;
        }

        @media (max-width: 480px) {
            .container {
                padding: 35px 20px;
            }

            h1 {
                font-size: 1.6em;
            }

            .download-btn {
                padding: 16px 18px;
                font-size: 1em;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📥 Download Repository</h1>
        <p class="subtitle">Select a stage to download</p>

        <div class="download-list">
            <a href="https://www.mediafire.com/folder/tvuvlslpz6l5q/Artist_Stage" target="_blank" class="download-btn btn-artist">
                <span class="btn-label">
                    <span class="btn-icon">🎤</span>
                    Artist Stage
                </span>
                <span class="download-icon">⬇️</span>
            </a>

            <a href="https://www.mediafire.com/folder/j47uluqxeftiz/X_Stage" target="_blank" class="download-btn btn-x">
                <span class="btn-label">
                    <span class="btn-icon">⭐</span>
                    X Stage
                </span>
                <span class="download-icon">⬇️</span>
            </a>

            <a href="https://www.mediafire.com/folder/o77fimimhrpe6/Mcountdown_Stage" target="_blank" class="download-btn btn-mcountdown">
                <span class="btn-label">
                    <span class="btn-icon">🏆</span>
                    Mcountdown Stage
                </span>
                <span class="download-icon">⬇️</span>
            </a>
        </div>

        <a href="index.html" class="nav-back">← Back to Stream Rooms</a>
    </div>

    <script>
        (async function() {
            try {
                const res = await fetch('/api/session', { credentials: 'same-origin' });
                const data = await res.json();
                if (!data.loggedIn) {
                    window.location.replace('index.html?authRequired=1&redirect=downloads.html');
                }
            } catch (e) {
                if (!localStorage.getItem('currentUser')) {
                    window.location.replace('index.html?authRequired=1&redirect=downloads.html');
                }
            }
        })();
    </script>
</body>
</html>
