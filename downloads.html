<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Download Repository — KCON 2026</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Helvetica Neue', sans-serif;
            background: radial-gradient(ellipse at 35% 40%, #2c2c2c 0%, #141414 45%, #060606 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
        }

        .orb {
            position: fixed; border-radius: 50%; pointer-events: none; z-index: 0;
        }
        .orb1 {
            width: 520px; height: 520px; top: -120px; left: -140px;
            background: radial-gradient(circle, rgba(255,255,255,0.06) 0%, transparent 70%);
            animation: drift1 14s ease-in-out infinite;
        }
        .orb2 {
            width: 600px; height: 600px; bottom: -160px; right: -160px;
            background: radial-gradient(circle, rgba(255,255,255,0.05) 0%, transparent 70%);
            animation: drift2 18s ease-in-out infinite;
        }

        @keyframes drift1 {
            0%  { transform: translateY(0) translateX(0); }
            50% { transform: translateY(-30px) translateX(16px); }
            100%{ transform: translateY(0) translateX(0); }
        }
        @keyframes drift2 {
            0%  { transform: translateY(0) translateX(0); }
            50% { transform: translateY(24px) translateX(-20px); }
            100%{ transform: translateY(0) translateX(0); }
        }
        @keyframes cardIn {
            from { opacity: 0; transform: translateY(20px) scale(0.97); }
            to   { opacity: 1; transform: translateY(0) scale(1); }
        }

        .card {
            position: relative; z-index: 1;
            width: 100%; max-width: 520px;
            background: rgba(255,255,255,0.04);
            backdrop-filter: blur(28px);
            -webkit-backdrop-filter: blur(28px);
            border: 1px solid rgba(255,255,255,0.10);
            border-radius: 28px;
            padding: 48px 40px 40px;
            box-shadow:
                0 8px 48px rgba(0,0,0,0.55),
                inset 0 1px 0 rgba(255,255,255,0.10),
                inset 0 -1px 0 rgba(255,255,255,0.03);
            animation: cardIn 0.5s cubic-bezier(0.34,1.56,0.64,1) both;
        }
        .card::before {
            content: '';
            position: absolute;
            top: 0; left: 10%; right: 10%;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.22), transparent);
            border-radius: 999px;
        }

        .page-label {
            color: rgba(255,255,255,0.35);
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.18em;
            font-weight: 600;
            margin-bottom: 10px;
        }
        h1 {
            color: #fff;
            font-size: 32px;
            font-weight: 700;
            letter-spacing: -0.02em;
            line-height: 1.1;
            margin-bottom: 8px;
        }
        h1 span { color: rgba(255,255,255,0.3); }
        .subtitle {
            color: rgba(255,255,255,0.38);
            font-size: 14px;
            line-height: 1.6;
            margin-bottom: 36px;
        }
        .divider {
            width: 100%; height: 1px;
            background: rgba(255,255,255,0.07);
            margin-bottom: 28px;
        }

        /* ── Dropdown wrapper ── */
        .download-list { display: flex; flex-direction: column; gap: 10px; margin-bottom: 32px; }

        .dropdown-wrapper { position: relative; }

        .download-btn {
            display: flex;
            align-items: center;
            justify-content: space-between;
            width: 100%;
            padding: 18px 20px;
            border-radius: 16px;
            border: 1px solid rgba(255,255,255,0.09);
            background: none;
            color: #fff;
            font-family: inherit;
            font-size: 15px;
            font-weight: 600;
            letter-spacing: -0.01em;
            cursor: pointer;
            position: relative; overflow: hidden;
            transition: transform 0.22s cubic-bezier(0.34,1.56,0.64,1), box-shadow 0.22s ease, border-radius 0.2s ease;
            animation: cardIn 0.5s cubic-bezier(0.34,1.56,0.64,1) both;
        }
        .download-btn::after {
            content: '';
            position: absolute; inset: 0;
            background: linear-gradient(135deg, rgba(255,255,255,0.06) 0%, transparent 60%);
            opacity: 0; transition: opacity 0.2s;
        }
        .download-btn:hover:not(.open) { transform: translateY(-3px); }
        .download-btn:hover::after { opacity: 1; }
        .download-btn.open { border-radius: 16px 16px 0 0; border-bottom-color: transparent; transform: none; }

        .btn-artist {
            background: linear-gradient(135deg, #1c1c3a 0%, #0f1a35 100%);
            box-shadow: 0 0 0 1px rgba(120,130,255,0.1), 0 4px 20px rgba(0,0,0,0.35);
            animation-delay: 0.08s;
        }
        .btn-artist:hover, .btn-artist.open {
            border-color: rgba(120,130,255,0.35);
            box-shadow: 0 0 0 1px rgba(120,130,255,0.35), 0 12px 32px rgba(80,100,255,0.2);
        }
        .btn-x {
            background: linear-gradient(135deg, #2a1a30 0%, #1a0f28 100%);
            box-shadow: 0 0 0 1px rgba(200,120,255,0.1), 0 4px 20px rgba(0,0,0,0.35);
            animation-delay: 0.14s;
        }
        .btn-x:hover, .btn-x.open {
            border-color: rgba(200,120,255,0.35);
            box-shadow: 0 0 0 1px rgba(200,120,255,0.35), 0 12px 32px rgba(160,80,255,0.2);
        }
        .btn-mcountdown {
            background: linear-gradient(135deg, #0e2240 0%, #091830 100%);
            box-shadow: 0 0 0 1px rgba(80,160,255,0.1), 0 4px 20px rgba(0,0,0,0.35);
            animation-delay: 0.2s;
        }
        .btn-mcountdown:hover, .btn-mcountdown.open {
            border-color: rgba(80,160,255,0.35);
            box-shadow: 0 0 0 1px rgba(80,160,255,0.35), 0 12px 32px rgba(30,120,255,0.2);
        }

        .btn-label { display: flex; align-items: center; gap: 14px; }
        .btn-icon-wrap {
            width: 38px; height: 38px; border-radius: 10px;
            background: rgba(255,255,255,0.07);
            border: 1px solid rgba(255,255,255,0.09);
            display: flex; align-items: center; justify-content: center;
            font-size: 17px; flex-shrink: 0;
        }
        .btn-name { color: #fff; font-size: 15px; font-weight: 600; letter-spacing: -0.01em; }

        .btn-arrow {
            width: 28px; height: 28px; border-radius: 8px;
            background: rgba(255,255,255,0.07);
            border: 1px solid rgba(255,255,255,0.09);
            display: flex; align-items: center; justify-content: center;
            flex-shrink: 0;
            transition: transform 0.3s ease, background 0.2s;
        }
        .btn-arrow svg { width: 12px; height: 12px; stroke: rgba(255,255,255,0.5); transition: transform 0.3s ease; }
        .download-btn.open .btn-arrow svg { transform: rotate(180deg); }
        .download-btn.open .btn-arrow { background: rgba(255,255,255,0.12); }

        /* ── Dropdown menu ── */
        .dropdown-menu {
            display: none;
            flex-direction: column;
            border: 1px solid rgba(255,255,255,0.09);
            border-top: none;
            border-radius: 0 0 16px 16px;
            overflow: hidden;
        }
        .dropdown-menu.open { display: flex; }

        .dropdown-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 14px 20px;
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
            color: rgba(255,255,255,0.75);
            transition: background 0.18s, color 0.18s;
            border-top: 1px solid rgba(255,255,255,0.06);
        }
        .dropdown-item:first-child { border-top: none; }
        .dropdown-item:hover { color: #fff; }

        #dropdown-artist .dropdown-item { background: rgba(28,28,58,0.9); }
        #dropdown-artist .dropdown-item:hover { background: rgba(50,50,100,0.9); }

        #dropdown-xstage .dropdown-item { background: rgba(42,26,48,0.9); }
        #dropdown-xstage .dropdown-item:hover { background: rgba(70,30,80,0.9); }

        #dropdown-mcountdown .dropdown-item { background: rgba(14,34,64,0.9); }
        #dropdown-mcountdown .dropdown-item:hover { background: rgba(20,50,100,0.9); }

        .day-label { display: flex; align-items: center; gap: 10px; }
        .day-icon { font-size: 13px; opacity: 0.6; }

        .dl-arrow-sm {
            width: 26px; height: 26px; border-radius: 7px;
            background: rgba(255,255,255,0.06);
            border: 1px solid rgba(255,255,255,0.08);
            display: flex; align-items: center; justify-content: center;
            flex-shrink: 0;
        }
        .dl-arrow-sm svg { width: 11px; height: 11px; stroke: rgba(255,255,255,0.4); }

        /* ── Footer ── */
        .footer-actions {
            display: flex; align-items: center; justify-content: space-between;
            padding-top: 4px;
        }
        .nav-back {
            display: flex; align-items: center; gap: 6px;
            color: rgba(255,255,255,0.35); text-decoration: none;
            font-size: 13px; font-weight: 500; transition: color 0.2s;
        }
        .nav-back:hover { color: rgba(255,255,255,0.7); }
        .nav-back svg { width: 14px; height: 14px; stroke: currentColor; }
        .logout-btn {
            padding: 9px 18px;
            background: rgba(255,59,48,0.12);
            border: 1px solid rgba(255,59,48,0.25);
            color: #f87171; font-size: 13px; font-weight: 600;
            border-radius: 10px; cursor: pointer; font-family: inherit;
            transition: background 0.2s;
        }
        .logout-btn:hover { background: rgba(255,59,48,0.22); }

        @media (max-width: 480px) {
            .card { padding: 36px 24px 32px; }
            h1 { font-size: 26px; }
        }
    </style>
</head>

                        <div class="dl-arrow-sm"><svg viewBox="0 0 16 16" fill="none" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M8 3v7M5 7l3 3 3-3M3 13h10"/></svg></div>
                    </a>
                    <a href="https://www.mediafire.com/folder/vjjzbiussz74a/X+STAGE+-+DAY+3" target="_blank" class="dropdown-item">
                        <span class="day-label"><span class="day-icon">📅</span> Day 3</span>
                        <div class="dl-arrow-sm"><svg viewBox="0 0 16 16" fill="none" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M8 3v7M5 7l3 3 3-3M3 13h10"/></svg></div>
                    </a>
                </div>
            </div>

            <!-- X Stage -->
            <div class="dropdown-wrapper">
                <button class="download-btn btn-x" onclick="toggleDropdown('xstage')">
                    <div class="btn-label">
                        <div class="btn-icon-wrap">⭐</div>
                        <span class="btn-name">X Stage</span>
                    </div>
                    <div class="btn-arrow">

                            <path d="M2 4l4 4 4-4"/>
                        </svg>
                    </div>
                </button>
                <div class="dropdown-menu" id="dropdown-xstage">
                    <a href="https://www.mediafire.com/folder/j47uluqxeftiz/X_Stage" target="_blank" class="dropdown-item">
                        <span class="day-label"><span class="day-icon">📅</span> Day 1</span>
                        <div class="dl-arrow-sm"><svg viewBox="0 0 16 16" fill="none" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M8 3v7M5 7l3 3 3-3M3 13h10"/></svg></div>
                    </a>
                    <a href="https://www.mediafire.com/folder/460yhu1rbs407/DAY+2" target="_blank" class="dropdown-item">
                        <span class="day-label"><span class="day-icon">📅</span> Day 2</span>
                        <div class="dl-arrow-sm"><svg viewBox="0 0 16 16" fill="none" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M8 3v7M5 7l3 3 3-3M3 13h10"/></svg></div>
                    </a>
                    <a href="https://www.mediafire.com/folder/riy0h6z7t5knx/DAY+3" target="_blank" class="dropdown-item">
                        <span class="day-label"><span class="day-icon">📅</span> Day 3</span>
                        <div class="dl-arrow-sm"><svg viewBox="0 0 16 16" fill="none" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M8 3v7M5 7l3 3 3-3M3 13h10"/></svg></div>

            <!-- Mcountdown Stage -->
            <div class="dropdown-wrapper">

                    <div class="btn-label">

                    </div>
                    <div class="btn-arrow">

                    </a>
                    <a href="https://www.mediafire.com/folder/s898zy8000v9x/MCOUNTDOWN_-_DAY_3" target="_blank" class="dropdown-item">

            <!-- All Stage Google Drive -->
            <a href="https://drive.google.com/drive/folders/1kNzu-E6DSKcgk91b3HAUz9XJFXXHUrNE?usp=drive_link" target="_blank" rel="noopener noreferrer" class="download-btn" style="background: linear-gradient(135deg, #1a3a1a 0%, #0d2a0d 100%); border: 1px solid rgba(100,220,100,0.2); box-shadow: 0 0 0 1px rgba(100,220,100,0.08), 0 4px 20px rgba(0,0,0,0.35); text-decoration: none; animation-delay: 0.26s;">

                Back to Stream Rooms

            <button class="logout-btn" onclick="logout()">Logout</button>
        </div>
    </div>

    <script>
        function toggleDropdown(id) {
            const menu = document.getElementById('dropdown-' + id);
            const btn = menu.previousElementSibling;
            const isOpen = menu.classList.contains('open');

            document.querySelectorAll('.dropdown-menu').forEach(m => m.classList.remove('open'));
            document.querySelectorAll('.download-btn').forEach(b => b.classList.remove('open'));

            if (!isOpen) {
                menu.classList.add('open');
                btn.classList.add('open');
            }
        }

        document.addEventListener('click', function(e) {
            if (!e.target.closest('.dropdown-wrapper')) {
                document.querySelectorAll('.dropdown-menu').forEach(m => m.classList.remove('open'));
                document.querySelectorAll('.download-btn').forEach(b => b.classList.remove('open'));
            }
        });

        (async function() {
            try {
                const res = await fetch('/api/session', { credentials: 'same-origin' });
                const data = await res.json();
                if (!data.loggedIn) {
                    window.location.replace('index.html?authRequired=1&redirect=downloads.html');
                }
            } catch (e) {
                if (!localStorage.getItem('currentUser')) {
                    window.location.replace('index.html?authRequired=1&redirect=downloads.html');
                }
            }
        })();

        async function logout() {
            try { await fetch('/api/logout', { method: 'POST', credentials: 'same-origin' }); } catch (e) {}
            localStorage.removeItem('currentUser');
            window.location.replace('index.html');
        }
    </script>
</body>
</html>
